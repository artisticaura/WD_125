<html>
<head>
    <title>Sub and Sup Tag Examples</title>
</head>
<body>

<table border="2"cellpadding="6">

<tr>
        <th colspan="2">FORMULAE</th>
    </tr>


    <tr>
        <th><h2>Maths Equations</h2></th>
        <th><h2>Chemical Formulas</h2></th>
    </tr>

    <tr>
        <td>a<sup>2</sup> + b<sup>2</sup> = c<sup>2</sup></td>
        <td>H<sub>2</sub>O</td>
    </tr>

    <tr>
        <td>(a + b)<sup>2</sup> = a<sup>2</sup> + 2ab + b<sup>2</sup></td>
        <td>CO<sub>2</sub></td>
    </tr>

    <tr>
        <td>log<sub>10</sub>(100)</td>
        <td>O<sub>2</sub></td>
    </tr>

    <tr>
        <td>a<sub>n</sub> = a<sub>n-1</sub> + d</td>
        <td>H<sub>2</sub>SO<sub>4</sub></td>
    </tr>

    <tr>
        <td>x<sup>-1</sup> = 1/x</td>
        <td>NaCl</td>
    </tr>

    <tr>
        <td>x<sup>3</sup> + y<sup>3</sup></td>
        <td>CaCO<sub>3</sub></td>
    </tr>

    <tr>
        <td>10<sup>2</sup> = 100</td>
        <td>NH<sub>3</sub></td>
    </tr>

    <tr>
        <td>x<sub>1</sub> + x<sub>2</sub></td>
        <td>CH<sub>4</sub></td>
    </tr>

    <tr>
        <td>e<sup>0</sup> = 1</td>
        <td>Fe<sup>2+</sup></td>
    </tr>

    <tr>
        <td>f(x) = x<sup>2</sup> + 3x + 5</td>
        <td>SO<sub>4</sub><sup>2-</sup></td>
    </tr>

</table>

</body>
</html>
