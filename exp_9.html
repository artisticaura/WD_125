

<html>
<head>
    <title>Registration Page</title>
</head>
<body>

<h2 align="center">Registration Form</h2>

<form action="success.html">

    <label>First Name:</label><br>
    <input type="text" name="fname" required><br><br>

    <label>Middle Name:</label><br>
    <input type="text" name="mname"><br><br>

    <label>Last Name:</label><br>
    <input type="text" name="lname" required><br><br>

    <label>Address:</label><br>
    <textarea name="address" rows="4" cols="30" required></textarea><br><br>

    <label>Mobile Number:</label><br>
    <input type="tel" name="mobile" pattern="[0-9]{10}" required><br><br>

    <label>College Name:</label><br>
    <input type="text" name="college" required><br><br>

    <label>Branch Name:</label><br>
    <input type="text" name="branch" required><br><br>

    <label>Technical Skills:</label><br>
    <input type="text" name="skills" required><br><br>

    <input type="submit" value="Submit">

</form>

</body>
</html>
